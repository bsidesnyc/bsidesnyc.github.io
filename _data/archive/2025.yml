  title: What It’s Like Being the Only Security Startup in Your YC Batch
  speakers:
  - name: Alex Chantavy
    company: SubImage
    title: Co-founder & CEO at SubImage
  - name: Kunaal Sikka
    company: SubImage
    title: Co-founder & President at SubImage
  description: 'Imagine going through Y Combinator surrounded by startups building AI agents for dog walkers, while you’re
    trying to sell IAM hygiene to the Fortune 500.

    On our acceptance call to the world’s most famous startup accelerator, we were told we were the first company in the batch
    that didn’t use the word “LLM” in our pitch. Go us.

    This talk is our "we were the weird kid" story from the YC Winter 2025 batch: what it felt like to build a security company
    in a culture steeped in growth hacks, virality, and AI everything.

    If you''ve ever dreamed about quitting your corporate job to start your own thing -- or watched from the sidelines while
    others made money off your open source project -- this is the talk for you.'

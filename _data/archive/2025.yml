- time_start: '17:00'
  time_end: '17:55'
  track: Tech - Red
  room: Tech - Red
  title: 'Navigating the Virtualization Battlefield: A Deep Dive into Hypervisor Attack Vectors'
  speakers:
  - name: Austin Gadient
    company: Vali Cyber
    title: Vali Cyber CTO & Co-Founder
  description: 'The intricate architecture of hypervisors, while providing remarkable flexibility and scalability for enterprise-level
    operations, also represents one of the most critical under-protected attack surfaces existing today. This concurrently
    introduces significant vulnerabilities that can be exploited by malicious actors.

    In this session, Austin Gadient, CTO and Co-Founder of Vali Cyber, will walk through real-world attack vectors recently
    leveraged against VMware ESXi and similar virtualization platforms, including remote code execution, Active Directory
    misconfigurations, and credential-based intrusions. Drawing on lessons from incidents like the MGM and MITRE breaches,
    Austin will dissect how attackers gain footholds, pivot across virtual environments, and execute hypervisor-level ransomware.
    The session will conclude with actionable best practices for security leaders looking to harden their virtual infrastructure.

    This talk is designed for technical audiences concerned with defending critical virtualization layers and aims to bridge
    the gap between vulnerability awareness and operational resilience.  '
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=ayw-l-8mULI
  recorded: true
- time_start: '17:30'
  time_end: '17:55'
  track: Tech - Other
  room: Tech - Other
  title: 'Exploit Intelligence with Agentic AI: Patch What Matters'
  speakers:
  - name: Dmitrijs Trizna
    company: Aisle
    title: Aisle, AI Security Researcher
  description: 'If you’re tired of dashboards that label everything “critical,” come see how exploit-aware AI puts scarce
    remediation hours where they count.

    Security teams are drowning in vulnerability data while attackers automate exploit development and weaponization. Fixing
    everything is impossible; fixing what truly matters demands context: understanding not just CVSS math but whether a working
    exploit is circulating now, how that code path is used in your stack, and what blast-radius it creates for the business.

    This talk shows how AI-native multi-agent systems can mine, reason over, and actionably surface exploit intelligence at
    machine speed. We trace the journey of how autonomous agents crawl exploit databases, KEVs, GitHub PoCs and correlate
    artefacts with call-graph and application context, providing a single enriched “fix-first” list your team can stomach.

    Attendees will learn: • How scoping of exploit maturity and organizational context can be automated with existing tools;
    • Design patterns for trustworthy agentic workflows (AI scaffolding, human-in-the-loop) • Metrics that prove noise reduction
    and dramatic days-to-patch gains.'
  type: talk

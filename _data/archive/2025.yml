  description: 'Active Directory Certificate Services (ADCS) have become a critical yet often overlooked attack vector in
    enterprise environments. Following the high-profile "Certified Pre-Owned" research, organizations are increasingly seeking
    pragmatic approaches to remediate certificate-based privilege escalation vulnerabilities (ESC1–ESC8).

    This session introduces a structured approach to ADCS security using BloodHound Enterprise. ADCS remediation empowers
    security teams to identify, prioritize, and remediate ESC paths. Attendees will learn how this methodology integrates
    attack path analysis, strategic remediation planning, and validation to reduce real-world risk.'

  description: 'The goal of this interactive workshop is to equip participants with a hands‑on understanding of modern passive
    network fingerprinting techniques - JA3, JA3N, JA4, p0f and MuonFP - and the ability to generate, interpret and apply
    these fingerprints in real‑world defensive workflows.

    Key Takeaways: Understanding the Evolution of Fingerprinting: Why we moved from p0f to MuonFP and from JA3 to JA4. Hands-on
    capturing fingerprints: generating JA3/JA4/p0f/MuonFP fingerprints. Understanding the limitations of fingerprints.'

    company: null
    title: Principal Security Researcher
  description: Adversaries map and navigate cloud attack paths by chaining misconfigurations, over-privileged principals,
    and exposed secrets in pursuit of privilege escalation and broader objectives. In this talk, we explore core attack primitives
    in Azure, Entra ID, and Microsoft 365, demonstrate how to simulate end-to-end attack chains, and analyze the resulting

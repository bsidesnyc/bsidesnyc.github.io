  title: Understanding Python Bytecode
  speakers:
  - name: Rocky Bernstein
    company: null
    title: Chief Mad Scientist Emeritus
  description: 'Most Python implementations interpret Python bytecode.  However, Python''s bytecode changes annually, which
    makes understanding it challenging.

    Furthermore, Malware is sometimes written in Python bytecode without source code.

    I will introduce tools for disassembling, assembling, running interactively, and decompiling Python bytecode.

    The particular tools I will use are:

    disassemblers: Python''s dis, and xdis: https://pypi.org/project/xdis/ assemblers: xasm: https://pypi.org/project/xasm/
    decompilers: uncompyle6: https://pypi.org/project/uncompyle6/, decompile3, and possibly https://pylingual.io bytecode
    interpreters x-python: https://pypi.org/project/x-python/ and debugger front-end trepan-xpy: https://pypi.org/project/trepanxpy/
    control-flow analysis: Python debugger that understands bytecode: trepan3k: https://pypi.org/project/trepan3k/

    And possibly others.

    If you sign up for the workshop, in advance please: 1. Join the bsidesnyc channel #0x05-py-bytecode-workshop 2. Please
    fill out https://forms.gle/6UxWoikrpVLfbyry7'

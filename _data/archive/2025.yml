  title: 'When Build vs Buy Is Rigged: Selling to Enterprises That Prefer Building In-House'
  speakers:
  - name: Amir Kavousian
    company: DevArmor
    title: Founder & CEO, DevArmor
  description: In security, the real competition isn’t other vendors. It’s their in-house script written by a staff engineer
    who left the company in 2018. Some security teams would spend 6 months building a brittle, undocumented internal tool
    just to avoid 3 weeks time in procurement. It is a trust, ego, and culture problem. In this talk, I’ll share hard-earned
    lessons as a repeat founder, navigating procurement barriers in FinTech, HealthTech, and media companies. We’ll unpack
    the psychology of in-house builders, how to earn trust without selling FUD, and how to become the tool they wish they
    had built.

  track: Entrepreneur
  room: Entrepreneur
  title: 'The Good Business: How to Bootstrap a Business to $10M and Beyond'
  speakers:
  - name: Christian Hyatt
    company: risk3sixty
    title: CEO & Founder @ risk3sixty
  description: 'This talk is a transparent account of my attempt to build a “good business”—one that is both financially successful
    and deeply ethical. It’s a transparent account of our journey from starting with nothing to achieving over $10M in revenue,
    and it’s a guide for anyone seeking to create a business that stands for integrity, craftsmanship, and meaningful impact.
    By reflecting on our story, sharing hard-earned lessons, and offering a roadmap.

    I hope the audience will gain inspiration, clarity, and confidence to embark on their own entrepreneurial journey. They’ll
    find comfort in knowing that the road to success is long and challenging—but entirely possible. With a roadmap to avoid
    common pitfalls and the motivation to persevere, readers will feel equipped to build their own “good business,” grounded
    in purpose, integrity, and sustainable success.'
  type: talk

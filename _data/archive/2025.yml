  title: 'How to Create Deep Partnerships with Technical Teams: Sales Engineering Lessons Learned'
  speakers:
  - name: Samantha Pearlstein
    company: Escape
    title: Founding Sales Engineer @ Escape
  description: 'Security teams often view vendors and Sales Engineers with skepticism—and for good reason. Yet when done right,
    technical vendor partnerships can accelerate your security goals rather than drain your time and budget.

    As a Sales Engineer working with technical teams across industries, I’ve learned what builds trust, what kills it, and
    how to create deep, outcomes-focused partnerships that truly help security teams. In this talk, I’ll share lessons on
    building effective partnerships between SEs and security teams, covering technical credibility, radical transparency,
    aligning on shared success metrics so POCs and deployments don’t fail, and strategies for consistent, meaningful communication.'
  type: talk

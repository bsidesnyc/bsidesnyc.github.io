  room: Tech - Other
  title: Breaking the Mobile Log Analysis Barrier with AI
  speakers:
  - name: Numa Dhamani
    company: iVerify
    title: Head of Machine Learning at iVerify
  description: Mobile security teams face overwhelming volumes of device logs during incident response, malware investigations,
    and vulnerability hunting. Traditional manual analysis of these logs can take security experts hours or days per device,
    creating significant bottlenecks, further compounded by the scarcity of specialized mobile security expertise. A forensic
    analysis framework leveraging traditional natural language processing approaches, along with large language models, can
    automatically analyze Android bug reports and Apple iOS unified logs at scale. This approach transforms complex, unstructured
    technical data into clear, comprehensible insights that reveal the complete security narrative of a device. By automatically
    connecting seemingly disparate events into coherent timelines, the methodology identifies critical security issues across
    device logs in minutes rather than days. The result is an immediate democratization of mobile forensics insights–anyone
    can understand what’s happening on their device, from security professionals to end users with no specialized mobile operating
    system knowledge. Importantly, all analysis is performed within a secure, controlled environment using privacy-preserving
    techniques that maintain data confidentiality. Through real-world case studies, this presentation will demonstrate how
    this approach fundamentally transforms mobile security operations by revealing hidden threats while making complex technical
    findings universally accessible.

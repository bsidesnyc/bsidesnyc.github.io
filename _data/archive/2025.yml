  title: Trust the Model? Weaponizing Windows AI for Payload Staging
  speakers:
  - name: Hari Shanmugam
    company: null
    title: Lead Red Teamer
  description: 'This talk explores how attackers can stage and execute payloads using Microsoft’s native AI stack specifically
    the Windows.AI.MachineLearning (WinML) API built into Windows 10/11. By embedding data inside ONNX model metadata or tensor
    fields, an attacker can deliver payloads through models that appear benign to both users and security tools.

    I will demonstrate how to abuse LearningModel::LoadFromFilePath() and model.Metadata() to extract and run payloads from
    simple file creation to full in-memory shellcode execution using only Microsoft-signed AI components and standard Windows
    APIs like CreateFileW and VirtualAlloc.

    The payload travels inside a model and inference itself becomes the loader. I will present a working PoC, discuss where
    ML pipelines intersect with trusted execution, and explore how defenders can detect and mitigate AI-layer abuse.

    Attendees will leave with new insight into abusing and defending ML surfaces on Windows, including tooling, TTPs, and
    what to log when AI models become malicious.'

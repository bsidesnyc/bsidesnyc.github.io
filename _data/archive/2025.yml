  title: 'Spycraft 2.0: Hunting Dead Drops in Web Applications'
  speakers:
  - name: Jonathan Fuller
    company: null
    title: Counteracting malware through logic reuse is actually a thing!
  description: In classic espionage, spies often used “dead drops” to exchange information without direct contact. A message
    might be hidden in a public location, such as inside a hollow brick or under a park bench, allowing another agent to retrieve
    it later without raising suspicion. Modern malware has adopted a similar tactic. Instead of hardcoding Command and Control
    (C2) server addresses, attackers embed encrypted or obfuscated C2 locations inside public web applications like Dropbox,
    GitHub, and Pastebin. This technique, known as a dead drop resolver, allows malware to dynamically locate its C2 server
    and makes it easy for attackers to migrate infrastructure if a server is discovered or taken down. These digital dead
    drops are difficult to detect using traditional methods. A new analysis system helps uncover these hidden links at scale,
    revealing how malware families use this strategy and offering insight into how defenders can proactively identify and
    disrupt such covert channels.
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=axuZzwJ7xnc

  title: P0LR Espresso - Pulling Shots of Cloud Live Response & Advanced Analysis
  speakers:
  - name: Art Ukshini
    company: Permiso Security
    title: Threat Researcher - Detection Engineer, Permiso Security
  description: 'In today’s detection landscape, defenders are overwhelmed by dashboards and visualizations that are often
    aesthetically pleasing but lack actionable insight. These tools rarely answer the core question: Is this identity compromised?

    P0LR Espresso, from name itself, lets you understand, that this tool is meant to be cold and direct. Like Espresso (Itl.
    Esprimere) ~ Press Out/Squeeze, P0LR Espresso, presses out and squeezes threats from a bunch of noisy logs across multiple
    cloud integrations (PaaS, IdP and SaaS) and brings them in front of our eyes using meaningful and clear visualizations!
    This tool has multi-cloud integration capabilities, normalizes field names, saving defender’s time trying to understand
    each integration’s structure, together with Live Response and Detection capabilities, which also makes it possible to
    create detections in real time and scan your logs in search for evil.

    P0LR Espresso empowers threat hunters, detection engineers, and incident responders to rapidly uncover an identity’s activity
    timeline, detect behavioral shifts, and pinpoint suspicious activity. With built-in detection capabilities, it’s especially
    effective when rapidly scanning normalized logs for known IOCs, triggering alerts on suspicious patterns, and jumpstarting
    investigations in high-pressure scenarios.

    Come pull up a chair and let us pull you a shot of P0LR Espresso - putting the "express" in Live Response for combatting
    cloud-focused threats.'

  title: 'Inside the Mind of a Cyber VC: What Founders Get Wrong and How to Pitch Like a Pro'
  speakers:
  - name: Lucas Nelson
    company: Lytical Ventures
    title: Lucas Nelson, Founding Partner @ Lytical Ventures
  description: 'I’ve reviewed over 1,000 cybersecurity startup pitches in the last two years—and I’ve seen the same patterns
    repeat. Incredible technical founders with bold ideas still struggle to raise capital, not because the tech isn’t good,
    but because they unknowingly make basic mistakes when speaking to investors. Many great ideas never get past the first
    meeting because founders pitch features instead of value, misunderstand their audience, or miss the broader strategic
    picture VCs are evaluating.

    This talk is a tactical, no-BS breakdown of what it actually takes to get funded in cyber. Whether you’re a hacker-turned-founder,
    a first-time entrepreneur, or just curious about how the venture game works behind closed doors, you’ll leave with actionable
    insights that could change the trajectory of your next raise.

    Lucas Nelson is a founding partner at Lytical Ventures, where he leads investments in cybersecurity and AI. He began his
    paid hacking career at @stake, starting as an application security pentester and rising to management roles. He is also
    a former member of Ninja Strike Force, associated with the hacker supergroup Cult of the Dead Cow.

    Before founding Lytical, Lucas held investing roles at DFJ Gotham and Evolution Equity. He is a Kauffman Fellow and a
    longtime advocate for early-stage security startups that push the industry forward.

    This talk shares common mistakes founders make, what actually gets a VC excited, and how to stand out in a crowded market. '
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=HJsZqwwN1iw
  recorded: true
- time_start: '10:00'
  time_end: '10:55'
  track: Tech - Blue
  room: Tech - Blue
  title: Detecting and Preventing Obfuscated Script Execution with Tree-sitter
  speakers:
  - name: David McDonald
    company: Volexity
    title: Software Engineer @ Volexity
  description: 'The malicious obfuscation of code from scripting languages, such as PowerShell, Python, and JavaScript, continues
    to be used as an essential part of threat actors'' toolkits. Obfuscation techniques hamper analysts'' ability to investigate
    and respond quickly to compromises by complicating reverse engineering of the original script and pose significant challenges
    to scanning engines, such as Yara, that rely on byte-based pattern recognition.

    Windows'' built-in defense mechanisms, notably the built-in Antimalware Scanning Interface (AMSI) DLLs, struggle to detect
    these obfuscations, allowing for trivial bypasses of the AMSI subsystem via relatively simple obfuscations. AMSI bypass
    tools and techniques are routinely deployed by obfuscated code as part of their infection chain.

    The tree-sitter parsing library opens new avenues for detection and analysis by providing an API that allows developers
    to interact programatically with a script''s syntax tree. This talk will showcase new techniques for rapidly detecting,
    analyzing, and preventing infections, culminating with the demonstration of a custom AMSI provider DLL that can deobfuscate,
    block, and log obfuscated PowerShell payloads.  These demonstrations will showcase successful, automated detection of
    AMSI bypass attempts from the r77 rootkit and the nishang offensive PowerShell framework, and payloads obfuscated with
    Invoke-Obfuscation.'
  type: talk

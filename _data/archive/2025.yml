  title: 'The Allure of Go''s Cross-Platform Capability: A Gateway for Threat Actors to Mac and Linux'
  speakers:
  - name: Anmol Maurya
    company: Palo Alto Networks
    title: Staff Malware Reverse Engineer, Palo Alto Networks
  description: 'Go-Based Malware Targeting Mac and Linux Systems This paper examines how malware authors leverage Go''s cross-platform
    capabilities to target Mac and Linux systems, exploring unique attributes, detection challenges, and hunting strategies
    for this growing threat vector.

    Key Focus Areas: Cross-Platform Variations: Go malware optimized for Mac and Linux shows distinct attributes across families.
    Examples include DragonFly APT''s backdoors and BlackCat/ALPHV''s ransomware implementations.

    Detection Challenges: Go''s compilation characteristics create substantial detection hurdles on non-Windows platforms,
    with a 43% increase in detection difficulty versus traditional malware.

    Reverse Engineering: Analysis of Go-based malware requires specialized approaches to overcome Go-specific obfuscation.
    Groups like Lazarus and APT29 increasingly use Go for its resistance to reverse engineering.

    Hunting Strategies: Effective identification requires specialized approaches leveraging threat intelligence and IoCs.
    Go-based malware targeting Mac/Linux has increased 267% in 18 months.

    Future Trends: Go-based malware now represents 11.8% of all new malware (up from 4.3% in 2021). Sophisticated actors including
    TeamTNT, SideWinder APT, and ransomware operations increasingly adopt Go to expand beyond Windows environments.

    This research highlights an emerging threat exploiting Go''s advantages to target previously underrepresented platforms
    in the malware landscape.'
  type: talk

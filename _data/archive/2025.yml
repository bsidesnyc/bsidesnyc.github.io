  title: 'From CISA to Starting Up: Shifting Secure by Design at Scale'
  speakers:
  - name: Jack Cable
    company: Corridor
    title: CEO & Co-Founder at Corridor
  description: 'How do you shift an entire industry? This talk explores my journey from leading the Secure by Design initiative
    at CISA to founding Corridor, an AI assistant for product security teams. This work stems from the core realization that
    most cyberattacks are preventable—not because we need better defenders, but because software is still shipped insecure
    by default. Software companies have the ability to prevent entire classes of vulnerabilities, and addressing this is equal
    parts tech and policy.

    I’ll share lessons from the policy side – starting the Secure by Design pledge, writing legislation, and shaping executive
    orders; the business side – the process of starting a startup, fundraising, and finding product-market fit; and the technical
    side – how we use AI to understand entire codebases and aid product security teams with otherwise-manual workflows.'

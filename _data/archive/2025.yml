  title: They Don’t Want to Talk to Sales—So Let the Community Sell for You
  speakers:
  - name: Mariana Padilla
    company: HACKERverse.ai
    title: CEO, HACKERverse.ai
  description: 'Today’s buyers are 70% of the way through their purchasing process before they ever reach out to sales. They’re
    comparing notes in Slack groups, lurking in Reddit threads, and following peers- not filling out demo forms. So if your
    growth strategy starts with “Talk to Sales,” you’ve already lost.

    This session will explore how startups can turn community into a core GTM motion- one that builds trust, accelerates deals,
    and lowers CAC. You’ll learn how to design a community that drives real business value by activating power users, surfacing
    product validation, and creating an environment where your customers do the selling for you.

    We’ll walk through actionable frameworks, real examples, and the metrics that matter when aligning community with your
    growth strategy.

    Who it’s for: Founders, GTM leaders, and community builders looking for a smarter path to scale- one that matches how
    people actually buy today.'
  type: talk

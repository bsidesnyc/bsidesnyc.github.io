  room: Tech - Blue
  title: 'Contribute to Learn: Building DFIR Expertise Through Open Source'
  speakers:
  - name: Christopher Eng
    company: null
    title: Independent Digital Forensic Researcher | CIO
  description: 'The best way to learn digital forensics and incident response (DFIR) isn’t just by reading books or watching
    videos—it’s by doing. Contributing to open-source DFIR tools like KAPE and Velociraptor offers a hands-on, real-world
    way to build, apply, and deepen your technical knowledge.

    In this talk, we’ll explore how contributing—whether through writing code, testing artifacts, improving documentation,
    or validating forensic results—forces you to engage critically with data structures, logs, operating system internals,
    and investigative workflows. I’ll share practical examples of how even small contributions can lead to big “a-ha” moments,
    demystify what it’s like to get started in open source, and show how this process naturally reinforces and expands your
    DFIR skillset.

    But the benefits go beyond just technical skill. Open-source work also connects you with a global community of practitioners,
    tool authors, and potential mentors. Contributing is a powerful way to get your name out there, receive feedback, and
    become part of the broader DFIR conversation through active participation.

    If you''re looking to level up your skills, grow your network, and learn by doing, this talk will show you how the path
    to deeper DFIR knowledge might just start with a pull request.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=fb7PzHq5x7A

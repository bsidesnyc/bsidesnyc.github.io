  title: 'The History of Malware: From Floppies to Droppers'
  speakers:
  - name: Eliad Kimhy
    company: Acronis
    title: Sr. Security Researcher at Acronis
  description: Modern malware, such as ransomware, has become synonymous with some of the most devastating cyber attacks of
    our time.. But it hasn't always been so. Not too long ago, malware was considered a myth. The first ransomware, for example,
    was created over 30 years ago as a wild scheme, devised by a man armed with 10,000 floppy disks and a virus. Since then,
    malware has evolved in many different ways, as technology changes and evolves. Looking back and analyzing this history
    gives us an unusual perspective- what elements of malware have changed throughout the years, and what has remained consistent?
    How has this evolved into the most impactful form of cybercrime today, and what can this surprising, untold history teach
    us about our present and future?

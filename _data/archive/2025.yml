  title: 'Syndicate: The Life of a Ransomware Affiliate'
  speakers:
  - name: Tammy Harper
    company: Flare
    title: Senior Threat Intelligence Researcher at Flare
  description: 'Syndicate: Inside the Life of a RaaS Affiliate is not your usual threat actor retrospective; it’s a psychological
    profile in three acts. We begin with the life of a skid (script kiddie): the copy-paster, the stealer-log dopamine chaser,
    the clout addict living in Telegram chats and cracked panels. Their world is a blur of fake flexes and small wins; high
    on illusion, tethered to someone else’s payload.

    Then we move to the mid-tier: ransomware operators negotiating ransoms between bites of cold noodles, barely holding their
    teams together, clashing over OPSEC and loyalty, and falling prey to the same scams they run. They operate in constant
    motion; spinning up infra, recycling brands, running Telegram polls to pick the next target. There’s no hierarchy, just
    reputation, vibes, and whoever controls the wallet.

    Finally, we look at the syndicate tier: Conti, LockBit, BlackBasta. Where KPIs matter more than skill. Where HR processes
    are more dangerous than intrusion vectors. Where recruitment, churn, and burnout mirror SaaS startups; except the product
    is extortion, and trust is everything.

    This talk draws from leaked playbooks, chat logs, and recruitment docs to unpack how affiliates function not just tactically,
    but structurally and socially. Attendees will leave with a renewed lens on how ransomware-as-a-service scales, and the
    human cost that powers it; not just threat actors, but labor inside an economy of deception.'
  type: talk

  title: 'From Interview Questions to Cluster Damage: Adventures in k8s Cluster Hacking'
  speakers:
  - name: Amit Serper
    company: Crowdstrike
    title: Lead security researcher, Crowdstrike
  description: What started as a simple exercise to create Kubernetes interview questions took an unexpected turn into discovering
    some interesting cluster security quirks. While brainstorming scenarios to test candidates' knowledge, we found ourselves
    saying "wait, would that actually work?" more times than we expected. This talk shares these discoveries, showing how
    even a cluster with a common configuration can lead to surprising cluster disruptions. We will guide you through our journey,
    sharing both the techniques we stumbled upon and practical ways to keep your Kubernetes infrastructure safe.

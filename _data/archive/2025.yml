- time_start: '13:00'
  time_end: '13:25'
  track: Entrepreneur
  room: Entrepreneur
  title: 'Trust at Scale: Lessons Learned from a Decade of Engineering for Identity'
  speakers:
  - name: Frederic Rivain
    company: Dashlane
    title: CTO Dashlane - Scaling Identity | Tech Agilist
  description: 'What does it take to build a security product that millions trust with their most sensitive information? Over
    the past decade, I have worked as the CTO at Dashlane, on a journey from a consumer password manager to a B2B identity
    security platform. It has been rich with breakthroughs—and equally rich with mistakes. In this talk, I will share stories
    from the trenches: the architectural decisions that shaped (and sometimes constrained) the product, the unseen costs of
    early technical debt, the real-world impact of evolving encryption standards, and how user expectations forced innovation
    in usability without compromising security. I will map key technical milestones to business and product shifts, illustrating
    how scaling trust isn''t just about technology—it''s about culture, trade-offs, and relentless adaptation. Attendees will
    walk away with practical insights into building secure-by-design systems, navigating B2C and B2B pivots, and leading engineering
    and security teams through constant change in the unforgiving identity security space.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=Ygw7RFrIDwU
  recorded: true
- time_start: '13:00'
  time_end: '13:55'
  track: Tech - Blue
  room: Tech - Blue
  title: Using Volatility 3 to Detect Sophisticated Malware
  speakers:
  - name: Andrew Case
    company: Volexity
    title: Director of Research, Volexity
  description: Volatility 3 is the latest version of the Volatility Memory Analysis framework, which has been the most widely
    used open-source framework for memory forensics since its creation in 2007. This new version of the framework is a complete
    rewrite starting from the first line of code. In this presentation, attendees will learn about Volatility 3’s new features
    while also seeing how many brand-new plugins can be used to detect a wide range of sophisticated, modern malware. This
    will include detection of the techniques currently deployed by ransomware and APT groups to evade EDR detection, inject
    code in a stealthy manner, and perform lateral movement. Attendees will leave understanding how to detect modern malware
    and attacker toolkits along with how to integrate Volatility 3 and its new features into detection workflows suitable
    for production use.
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=cpjP2wius-k
  recorded: true
- time_start: '13:00'
  time_end: '13:55'
  track: Tech - Other
  room: Tech - Other
  title: 'Living off the (land)cloud: Scattered Spider and the cloud control plane'
  speakers:
  - name: Shivakumar Buruganahalli
    company: Acalvio
    title: Acalvio, Senior Director, Customer Engineering
  description: 'Scattered Spider has escalated its exploits in 2025, expanding beyond telcos to target enterprises across
    industry verticals. After gaining initial access through social engineering, the threat group is increasingly targeting
    cloud workloads, to elevate permissions for lateral movement. Attacks targeting the cloud control plane, focused on the
    IAM service, provide the attacker access to high-value assets and sensitive data. These attacks, known as Living off the
    Cloud attacks, avoid malware and leverage built-in cloud primitives for offensive activity.

    This session focuses on identity exploits as part of the overall attack lifecycle of Scattered Spider. Through real-world
    attack demonstrations and analysis, the session outlines the stealthy enumeration tactics to identify privileged identities,
    IAM-specific exploits to elevate permissions, and lateral movement.

    The session covers the defender’s perspective, what makes detection challenging as attackers pivot across control and
    data planes, and provides a practitioner’s learnings on countermeasures to defend against cloud identity exploits. '

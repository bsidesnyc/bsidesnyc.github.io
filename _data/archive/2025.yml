  title: 'Hidden Payloads: Advanced Malware Exploitation via PDF Files'
  speakers:
  - name: Filipi Pires
    company: null
    title: Head of Identity Threat Labs and Global Product Advocate
  description: 'This is a hands-on presentation that will guide you through the world of PDF exploitation, showcasing how
    this ubiquitous document format can serve as a vessel for malicious JavaScript malware. Dive into real-world vulnerabilities
    that have been leveraged to execute harmful code directly through PDF files—posing major threats in today''s cybersecurity
    landscape.

    Key exploit techniques explored will include:

    Heap Spray Attacks: Gain insight into how attackers use shellcode to overwrite memory, enabling arbitrary code execution
    and sys­tem compromise. Data Exfiltration Tactics: Discover methods for covertly extracting sensitive data, such as email
    addresses and system information, from unsuspecting users. Embedding Malware in PDFs: Learn how adversaries embed malicious
    scripts within PDF files, tricking users into triggering exploits in Adobe Reader through typical file interactions. We''ll
    dissect techniques including shellcode injection, buffer overflow attacks, Adobe Reader exploitation, and memory manipulation—each
    engineered to deliver and execute malware efficiently.

    This session is ideal for offensive security professionals, penetration testers, and threat emulation experts seeking
    to elevate their understanding of PDF-based threats and enhance their testing skills.

    More information about the presentation can be found in this article: https://labs.segura.blog/unmasking-the-threat-a-deep-dive-into-the-pdf-malicious-2/'

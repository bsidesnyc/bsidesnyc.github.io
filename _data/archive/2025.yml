  track: Tech - Blue
  room: Tech - Blue
  title: 'Unseen in the Stack: Mapping Hidden Java Dependencies for Real-World Defense'
  speakers:
  - name: Oron Gutman
    company: Hopper Security
    title: Hopper Security, CTO
  description: 'Modern Java applications often include dependencies that aren''t declared, aren''t visible, and aren''t scanned.
    Through shading, repackaging, and renaming, vulnerable libraries can hide inside legitimate artifacts, rendering traditional
    SCA tools blind to real risk. These hidden dependencies are increasingly common in enterprise code, but rarely discussed
    or addressed systematically.

    This talk presents research on how shaded and repackaged libraries propagate in the wild, based on analysis of real Maven
    repositories and build artifacts. We’ll share anonymized examples of hidden vulnerability paths, show how they evade detection,
    and propose a repeatable methodology for defenders to uncover and address them. You’ll learn techniques like bytecode
    fingerprinting, call graph analysis, and symbol introspection that can turn opaque artifacts into observable objects without
    relying on vendor tooling or runtime agents.

    If you’ve ever been surprised by a vulnerability in a dependency you didn’t know you had, this talk is for you.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=Niv2L_e4dWI
  recorded: true
- time_start: '12:00'
  time_end: '12:55'
  track: Tech - Other
  room: Tech - Other
  title: 'Deconstructing LightSpy''s True Scale: 70-Plugin Framework, Router Infections, Live Operator Panels,'
  speakers:
  - name: Dmitry Bestuzhev
    company: null
    title: CTI Researcher
  - name: Dmitry Melikov
    company: null
    title: Security Researcher
  description: 'Deconstructing LightSpy''s True Scale: 70-Plugin Framework, Router Infections, Live Operator Panels, and Commercial
    Cover

    LightSpy operates as a continuously developed surveillance platform with 70+ plugins targeting iOS, Android, macOS, Windows,
    Linux, and routers. Through SSL certificate fingerprint pivoting, we expanded one known C2 into a 22-server infrastructure
    spanning AWS Seoul, Google Cloud US, and Huawei Istanbul. Live C2 panel analysis revealed professional Vue.js applications
    with 56 JavaScript modules, role-based operator authentication (/***/home/phones), and victim management displaying "implanted
    phones" statistics. We discovered active router compromises: in South Africa and Czech Republic to Turkish infrastructure.
    Recent plugin additions include social media database extractors, Windows keyloggers, and iOS destructive modules preventing
    device boot. Attribution traces to operators using Chinese mapping services (webapi.amap.com) while operating under legitimate
    business registration. This research demonstrates certificate-based infrastructure mapping, exposes router infected operations,
    and reveals the commercialization of state-level surveillance capabilities.'
  type: talk
  slides_url: null
  video_url: null
  recorded: true
- time_start: '12:00'
  time_end: '12:55'
  track: Tech - Red
  room: Tech - Red
  title: 'Gridlock:  The Dual-Edged Sword of EV and Solar APIs in Grid Security'
  speakers:
  - name: Vangelis Stykas
    company: null
    title: CTO
  description: In this talk, we delve deep into the increasingly interconnected world of electronic vehicles (EVs), photovoltaic
    (PV) solar systems, and the broader power grid infrastructure—a nexus that is becoming a fertile ground for potential
    large-scale cyber disruptions. As we navigate through this complex interplay of technology and infrastructure, we will
    uncover the critical vulnerabilities lurking within the API connections that bind these systems together. Our exploration
    will not only highlight these weaknesses but will also demonstrate, through real-world scenarios and potential attack
    vectors, how they can be exploited to launch sophisticated cyber-attacks, emphasizing the urgent need for robust security
    frameworks and proactive cybersecurity measures to safeguard our collective future. The advent of PV inverters and EV
    charging systems has been marred by the industry's "rush to market" mentality, leading to overlooked security considerations.
    These critical weaknesses potentially allow remote attackers unprecedented control, with the ability to fully commandeer
    or even incapacitate these devices. Our investigation will reveal how targeting cloud platforms used by installers could
    unlock elevated access not just to PV inverters but also to EV chargers. This access includes functionalities usually
    restricted from the systems' proprietors, thereby opening a pandora's box of vulnerabilities.
  type: talk
  slides_url: null
  video_url: null
  recorded: true
- time_start: '12:00'
  time_end: '12:55'
  track: Workshop
  room: Workshop
  title: Mastering OWASP Amass v5.0
  speakers:
  - name: Jeff Foley
    company: OWASP Foundation
    title: Amass Project Leader, OWASP Foundation
  description: 'OWASP Amass has long been recognized as a leading open source tool for performing network reconnaissance and
    external asset discovery. With the release of version 5.0, the project has taken a major leap forward, transitioning from
    a purely scanning and enumeration tool to a robust, graph-powered asset intelligence framework. This two-hour hands-on
    workshop introduces attendees to the groundbreaking advancements in Amass v5.0, particularly focusing on the new Open
    Asset Model, the internal asset database, and the powerful assoc command-line utility that enables graph-based querying
    and exploration through the use of custom Triples.

    This workshop is designed for security professionals, bug bounty hunters, red team operators, and researchers who want
    to gain a competitive edge by using advanced tooling for external asset discovery and reconnaissance. Attendees will leave
    with a deep understanding of how Amass stores and structures asset intelligence, how to query this information meaningfully,
    and how to extract high-value insights through a declarative graph traversal interface.

    This is not just an upgrade; it is a reinvention of Amass for the next generation of OSINT practitioners. Join us for
    a deep dive into the Amass Open Asset Model and learn how to supercharge your reconnaissance with graph-based discovery.'
  type: workshop
  slides_url: null
  video_url: null
  recorded: true

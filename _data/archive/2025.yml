  title: 'The Human-AI Handshake: A Framework to Build Trust and Unlock Innovation in Modern Security Ops'
  speakers:
  - name: Michael Raggi
    company: CrowdStrike
    title: Crowdstrike Principal Threat Response Specialist | Art & Binary Recovery Specialist
  description: 'Michael August Raggi - Crowdstrike| Principal Response Specialist: https://www.linkedin.com/in/michael-august-raggi-532b3939/

    Description: In modern security operations it is the function of AI to automate the menial, not the meaningful!

    The availability of generative AI in commercial cyber security operations has become widely available in the cybersecurity
    landscape. While the maturity of this tooling has led to an explosion of applications to increase efficiency, no clear
    playbook on how to deploy AI at scale to achieve the best outcomes for enterprise security and the human workforce has
    yet emerged.

    This presentation proposes a framework for balancing efficiency gains (agentic AI), freeing up the workforce of analysts
    to use their creativity for innovation (generative. AI), and balancing the rate of adoption to achieve better outcomes
    without cultural resistance to AI slowing the impact that this tool can have. This framework seeks to unlock efficiency
    and enhance the creativity of analysts to explore work that provides meaningful innovation in enterprise security operations.'
  type: talk

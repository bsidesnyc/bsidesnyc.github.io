    title: CEO & Co-Founder at Leen
  description: 'In an industry dominated by security veterans and technical specialists, Leen (our startup) took an unconventional
    path. This talk reveals how two non-security professionals joined forces with one security expert to create a company
    that''s challenging industry norms. We''ll share how our backgrounds in food delivery, consumer/B2B SaaS, and venture
    capital equipped us with fresh perspectives on persistent security challenges.

    Learn how we''ve applied lessons from consumer-focused industries to security, prioritizing design thinking, compelling
    marketing narratives, and content-driven growth strategies that traditional security vendors often overlook. We''ll discuss
    how our ''outsider'' status became our greatest advantage, enabling us to question established approaches and build solutions
    that resonate with both technical and non-technical stakeholders.

    This session offers practical insights for aspiring founders without traditional security credentials, established security
    professionals seeking fresh GTM approaches, and anyone interested in how cross-industry experience can drive innovation
    in specialized technical fields.'

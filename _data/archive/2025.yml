  title: Why Being A Great Technologist May Not Make You A Great CEO (And How To Bridge The Gap)
  speakers:
  - name: Jason Kaplan
    company: SixMap
    title: CEO at SixMap
  description: 'Technical excellence and business leadership don’t always optimize for the same outcomes. While engineers
    and software architects often seek elegant solutions and innovation, CEOs are prioritizing customers'' needs and time-to-market.
    Enterprise buyers are often willing to accept an imperfect solution, as long as it works and it’s available right now.

    In this talk, SixMap CEO Jason Kaplan will discuss why great technologists don’t automatically make great CEOs. Technologists
    can of course become outstanding CEOs but, like anything else in life, becoming a great business leader requires time,
    effort, and lots of learning (usually the hard way).

    Jason will share some of the lessons he’s learned along the way of his 27 year career to help technologists mature into
    more effective CEOs. The focus will be on the areas that technologists often find most challenging: building teams and
    managing people, communicating to executives, making fast decisions with lots of uncertainty, and balancing the tradeoffs
    between product development and time-to-market.

    Ultimately, success in cybersecurity entrepreneurship isn''t about having the perfect plan—it''s about surviving the chaos
    long enough to figure out a plan that works. '

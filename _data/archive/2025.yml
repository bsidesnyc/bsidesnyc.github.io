  title: 'From pocket to Pwn: How we hacked a multinational corp for $200 with whats in our pockets'
  speakers:
  - name: Tim Shipp
    company: ThreatLight
    title: CTO & Co-Founder of ThreatLight
  description: 'Not all Red Team engagements are spearphish > mimikatz > profit. If nothing else, this talk proves that some
    jobs still involve crawling around car parks at night and hiding in bushes with a high gain antenna to gain your objective.

    Traditionally, cyber incidents and Red Team operations focus on compromising Windows devices as an initial infection vector
    but for modern cloud native companies, this approach simply doesn’t work.

    In this talk, we will explore how we compromised an Electric Vehicle to infiltrate a corporate Smartphone, leveraging
    legitimate applications and protocols to move laterally and achieve full compromise of the environment.

    We will demonstrate the chaining of low code (and in some cases ancient techniques), abstract attack vectors targeting
    atypical devices and platforms and the abuse of protocols and inbuilt applications to conduct a full scale breach of the
    environment. '

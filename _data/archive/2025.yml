- time_start: '17:00'
  time_end: '17:55'
  track: Tech - Blue
  room: Tech - Blue
  title: 'Tinker Tailor LLM Spy: Investigate & Respond to Attacks on GenAI Chatbots'
  speakers:
  - name: Allyn Stott
    company: Airbnb
    title: Senior Staff Engineer, Airbnb
  description: 'It’s coming, and you aren’t ready—your first generative AI chatbot incident. GenAI chatbots, leveraging LLMs,
    are revolutionizing customer engagement by providing real-time, automated 24/7 chat support. But when your company’s virtual
    agent starts responding inappropriately to requests and handing out customer PII to anyone that asks nicely, who are they
    going to call? You.

    You’ve seen the cool prompt injection attack demos and may even be vaguely aware of preventions like LLM guardrails; but
    are you ready to investigate and respond when those preventions inevitably fail? Would you even know where to start? It’s
    time to connect traditional investigation and response procedures with the exciting new world of GenAI chatbots.

    In this talk, you’ll learn how to investigate and respond to the unique threats targeting these systems. You’ll discover
    new methods for isolating attacks, gathering information, and getting to the root cause of an incident using AI defense
    tooling and LLM guardrails. You’ll come away from this talk with a playbook for investigating and responding to this new
    class of GenAI incidents and the preparation steps you’ll need to take before your company’s chatbot responses start going
    viral—for the wrong reasons.'
  type: talk
  slides_url: null
  video_url: null
  recorded: true
- time_start: '17:00'
  time_end: '17:25'
  track: Tech - Other
  room: Tech - Other
  title: 'Cloud’s Dirty Little Secret: It Was Misconfigs All Along'
  speakers:
  - name: Karl Ots
    company: EPAM
    title: Head of Cloud Security at EPAM | Author and Inventor
  description: 'Everyone loves to chase the next big exploit, but here’s the truth: most cloud breaches don’t start with some
    elite APT magic — they start with someone leaving the front door wide open. Misconfigurations are the silent killer of
    cloud security, and they’re everywhere.

    After tearing down hundreds of Azure deployments across industries, I’ve seen the same screw-ups again and again — from
    Fortune 500s to scrappy startups. In this talk, I’ll walk through the most common cloud security faceplants, why they’re
    so easy to make (and miss), and how to actually fix them before someone else finds them first.

    If you’ve ever wondered what cloud security looks like when it fails quietly, this is your wake-up call.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=KU2g6OheMxM

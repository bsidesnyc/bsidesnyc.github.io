  title: Rebooting the cyber arsenal of democracy
  speakers:
  - name: Eric Foster
    company: TENEX.ai
    title: CEO - TENEX.ai
  description: 'Starting a cybersecurity company has never been easier - and yet, never more brutally competitive. With the
    explosion of AI tools, the collapse of traditional GTM tactics, and VC capital tightening across the board, today’s founder
    must be faster, leaner, and more resilient than ever.

    Eric Foster has been part of building and exiting multiple successful security companies, including RiskIQ (acquired by
    Microsoft) and Cyderes (acquired by private equity). Today, he’s building TENEX.AI - an AI security company backed by
    Andreessen Horowitz (a16z) - and he’s doing it in the crucible of rising threats, shifting platform power, and a rapidly
    evolving venture market.

    In this no-BS, field-tested talk, Eric shares what he’s learned across his arc: what it really takes to start a security
    company in 2025, how to raise venture capital from the right partners (and avoid the wrong ones), how to and not to be
    successful at the most challenging aspect of starting a company (GTM) - and why the next generation of cybersecurity leadership
    has a moral imperative to rebuild the digital arsenal of democracy. This isn’t theory. It’s war stories, scar tissue,
    and tactical playbooks - straight from the front lines.

    Founders, operators, and future entrepreneurs: if you’re thinking about building in security, this is the session you
    can’t afford to miss.'
  type: talk

  title: Broken links - Behind the scenes of Supply Chain breaches
  speakers:
  - name: François Proulx
    company: null
    title: null
  description: 'Supply Chain attacks are all over the news as several high profile breaches highlight CI/CD pipelines as a
    prime target. The supply chain links the developer''s laptop, via the SCM, through CI/CD and finally the running application
    in production.


    We''ve all heard about the SolarWinds breach, but what can be done to prevent such an attack? In this talk, we dive behind
    the scenes of similar attacks through the lens of SLSA (Supply chain Levels for Software Artifacts), a threat model designed
    to tackle these emergent threats.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=gpqLgEqp_jA

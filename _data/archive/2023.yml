  title: 'A Chess Tournament: China/Russia Underground Ecosystem Comparison'
  speakers:
  - name: Mao Sui
    company: null
    title: null
  - name: Oxana
    company: null
    title: null
  description: Both Chinese and Russian-speaking actors continue to pose threats to organizations globally. It is critical
    for cybersecurity specialists to be prepared against these threat actors by understanding underground ecosystems and seeing
    how they evolve through a clear lens. The case studies covered in this presentation will shed light on the connections
    between geopolitical events and underground activities. Information and data analysis included in this presentation will
    help cybersecurity specialists and network defenders predict future trends and protect their organizations against threats
    originating from both China and Russia.
  type: talk
  slides_url: null
  video_url: null
  recorded: false
- time_start: '17:00'
  time_end: '17:50'
  track: Talk - Red
  room: L.63
  title: A few tricks to Anonymizing your Red Team
  speakers:
  - name: Patrick Matthews
    company: null
    title: null
  description: Adding onto my 2019 Derby con talk about using pre-paid cards to gain hosting infrastructure. This talk will
    detail a few other ways to anonymize Red Team activities. Such as, self-destroying drop box's to hinder IR; OPSEC notes
    about using infrastructure with Tor access; highlighting trackers to avoid when cloning a site and ways to avoid brand
    monitoring; ways to build better concealment for drop boxes; OPSEC concealment with infrastructure, TLS and LTE service.
    I will also review what no longer works from my 2019 talk as related to anonymous accounts.
  type: talk
  slides_url: null

  room: L2.85
  title: 'The FBI Citizen''s Academy: Outreach Experience'
  speakers:
  - name: Beck (blither)
    company: null
    title: null
  description: 'I will walk participants through what it''s like to apply for and then be selected to participate in the FBI
    Citizen''s Academy, from my vantage as a participant and a graduate of the Class of 2022. I''ll then outline the FBI''s
    involvement with: FATS (firearms training, both virtual and field-based), the Infraguard, our regional forensics computer
    crime lab, human trafficking, drug cases, murder, kidnapping, international and domestic terrorism, hate crimes, bomb
    threats, gangs, public corruption, white collar crimes, weapons of mass destruction, radicalization, counterterrorism
    and counterintelligence. I''ll conclude with a Q&A session. I''m hopeful that this will dispel some myths about the FBI
    in who they are and what they do, and provide an additional outreach point of contact for anyone who would wish to get
    involved.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=oh7d0FR5Bkw
  recorded: true

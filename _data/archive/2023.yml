  room: L2.85
  title: The Rise and Fall of the Trickbot and Conti Empires
  speakers:
  - name: Alex Holden
    company: null
    title: null
  description: In a post-mortem analysis of Trickbot/Conti gangs, I'll detail our unique view into their operations, methods,
    and lives. Real time access to Conti Leaks was just one of many tools in our arsenal. Our work and unique vantage point
    has prevented a significant portion of the gang's crimes. This story is about our journey, process, and insights into
    one of the most notorious cybergangs of our time.
  type: talk

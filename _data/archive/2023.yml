  room: L2.85
  title: 'The Dark Side of ChatGPT: Balancing Innovation and Security in the Age of Generative AI'
  speakers:
  - name: Aditya Patel
    company: null
    title: null
  description: 'ChatGPT is here to stay. With the increasing reliance on Artificial Intelligence everywhere, it is crucial
    to consider the security and privacy implications of generative AI.


    The talk will cover potential misuse of AI: spreading false information, abusing its capabilities to assist with security
    attacks such as phishing or malware, and the difficulties in detecting and mitigating malicious input and output.


    The goal of this talk is to increase awareness and understanding of the security challenges with generative AIs. And to
    encourage efforts to ensure the safe and secure use of these powerful tools. Yes, tools.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=x0coh7acrC0

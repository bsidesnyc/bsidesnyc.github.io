  title: 'It''s the Economy, Stupid: Tackling technical debt in times of economic uncertainty'
  speakers:
  - name: Ariel Robinson
    company: null
    title: null
  description: No matter the number of weeks between my submitting this abstract and you reading it, we've probably seen about
    as many wrong market predictions as we've seen CVEs. Economic uncertainty is... not great, but it does give security teams

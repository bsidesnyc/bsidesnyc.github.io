  track: Workshops
  room: L.61
  title: Building the Foundations of a Cyber Threat Intelligence Program (2 hour session)
  speakers:
  - name: Susan Peediyakkal
    company: null
    title: null
  description: 'This workshop is designed to provide participants with a comprehensive understanding of the process and best
    practices for building a robust Cyber Threat Intelligence (CTI) program. The workshop will cover various aspects of threat
    intelligence including data collection, analysis, and dissemination. Participants will learn about the importance of threat
    intelligence in the current threat landscape, and how to establish an effective program that can help mitigate risks and
    prevent attacks.


    Through interactive discussions and case studies, participants will gain insights into the tools and techniques required
    for collecting, analyzing, and reporting on threat intelligence. The workshop is ideal for security professionals, threat
    analysts, and anyone responsible for managing security risks. Participants will come away with a solid understanding of
    the key components of a successful threat intelligence program, and how to implement them in their own organizations.'
  type: workshop
  slides_url: null
  video_url: null
  recorded: true
- time_start: '11:00'
  time_end: '11:50'
  track: Talk - Blue
  room: L2.84
  title: Hunting Threat Actors using OSINT Forensics
  speakers:
  - name: Abi Waddell
    company: null
    title: null
  description: Little attention is given to tracking the perpetrators of cyber-attacks in the world of forensics. Using real
    world examples, I will present some OSINT methods to trace the location and identity of threat actors, including revealing
    deleted parts of screenshots/PDFs, discerning fake accounts, finding suspicious VPN addresses, uncovering identities from
    pseudonyms; using account leaks, search engine analytics, maps, social media, images and more. I will also present the
    results of my original research of thousands of leaked accounts, into identifying gender, age and predicted passwords
    in use, which can assist in threat actor identification.
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=gCN42va4cgw
  recorded: true
- time_start: '11:00'
  time_end: '11:50'

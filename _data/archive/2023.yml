  room: L2.84
  title: Hunting for RomCom RAT inside of the context of the war in Ukraine
  speakers:
  - name: Dmitry
    company: null
    title: null
  - name: Jacob Faires
    company: null
    title: null
  description: A few hours before the Ukraine war officially began, apparently, a Russian-sponsored wiper campaign occurred.
    During the following weeks and months, we saw several operations and weapons used against Ukraine. One of them is the
    RomCom RAT. The threat actor behind it used different initial access schemes to compromise the Ukrainian military and
    governmental entities. In our presentation, we will describe how we hunted it each time the threat actor changed its network
    infrastructure and how the RomCom RAT works inside the TO (theater of operations).
  type: talk
  slides_url: null
  video_url: null
  recorded: false

  track: Talk - Blue
  room: L2.84
  title: 'The Metrics Mess: Why the Lack of Clear and Common KPIs is Undermining SecOps (and How We Can Fix It)'
  speakers:
  - name: Eric Olson
    company: null
    title: null
  description: 'Critical SOC KPIs? MTTD. MTTR. Right?

    Except... "Detect" starts from compromise? Or Alert?

    One "expert" says "Respond" means "time to resolve an incident" but defines neither "resolve" nor "incident."

    Time-To- Qualify? Identify? Triage? Contain? Resolve? Recover?

    I run SOC/CIRT for a F500. My vendors all use different words. Metrics don''t align. It''s ridiculous. I''ve tabulated
    30+ sources and... no one has a frickin'' clue.

    We need a common language, like ATT&CK gives TTPs. If "a problem well-defined is half-solved" we''re doing a crap job
    solving this. EVERYONE''S Security suffers as a result. I''ve diagramed one possible solution as a conversation-starter.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=SmcKzH5sid8
  recorded: true
- time_start: '16:00'
  time_end: '16:50'
  track: Talk - Other
  room: L2.85
  title: 'Beyond the Buzz: SBOMs, AI, and DataOps for Organizational Resilience in a Post-Log4j World'
  speakers:
  - name: Jessie Jamieson
    company: null
    title: null
  description: 'Supply chain compromises and ransomware attacks have presented new sources of cyber risk which are magnified
    in the context of the ubiquity of data and automation. However, with new threats come new technologies and concepts; software
    bills of materials (SBOMs) and AI/ML enabled operations have become increasingly popular as potential countermeasures
    for the evolving threat landscape. We''ll spend part of this talk discussing SBOMs and AI/ML tools for cybersecurity workflows
    (including cautionary tales), and wrap up with a discussion of the soft underbelly of all emergent tools and strategies:
    validation, verification, and effective prescriptive data science and operations.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=yogmzTXsphk
  recorded: true
- time_start: '16:00'
  time_end: '16:50'
  track: Talk - Red
  room: L.63
  title: 'Save the Environment (Variable): Hijacking Legitimate Applications with a Minimal Footprint'
  speakers:
  - name: Wietze Beukema
    company: null
    title: null
  description: DLL Hijacking, a well-known technique for executing malicious payloads via trusted executables, has been scrutinised
    extensively, to the point where defenses are in a much better position to detect malicious use. In this presentation,
    we take a closer look at how process-level Environment Variables can be abused for taking over legitimate applications.
    Taking a systemic approach, we demonstrate that 80+ Windows-native executables are vulnerable to this special type of
    DLL Hijacking. As this raises opportunities for UAC bypass and Privilege Escalation, we discuss the value and further
    implications of this technique. We also look at preventative/defensive measures, especially for this type of DLL Hijacking,
    but also for DLL Hijacking more broadly.
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=pWyVOn0k1Tc
  recorded: true

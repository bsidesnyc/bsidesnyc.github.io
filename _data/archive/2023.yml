  room: L.63
  title: xIoT Hacking Demonstrations & Strategies to Disappoint Bad Actors
  speakers:
  - name: Brian Contos
    company: null
    title: null
  description: We'll demonstrate several hacks against xIoT, or Extended Internet of Things, devices. For those who would
    say, "But they're just security cameras monitoring the parking garage, wireless access points in the cafeteria, or PLCs
    controlling robotic welding arms; what harm can they cause?" - this will illuminate that harm. We'll share stories from
    the trenches involving cybercriminals, nation-state actors, and defenders. Our presentation will detail findings from
    over six years of xIoT threat research spanning millions of production devices in enterprises and government agencies
    around the world. We'll identify various steps organizations can take to mitigate risk while embracing a Things-connected
    world.
  type: talk

  track: Talk - Blue
  room: L2.84
  title: Closing the Gap vs Adversaries With Community Resources
  speakers:
  - name: Ian Davila
    company: null
    title: null
  description: Identifying adversary behaviors that matter to your organization has always been a difficult task. The purpose
    of this talk is to help close that gap by exploring adversary behaviors communicated through MITRE ATT&CK and Tidal Cyber.
    Traditionally, teams have had to wade through large volumes of unstructured CTI to surface the most relevant groups, software,
    or campaigns, adding so much time that the exercise becomes prohibitive. We will demo and show how structured metadata
    around threats, such as motivations, sectors, and victim locations unlocks achievable "threat profiling", and how pivoting
    to relevant techniques, procedures, defenses, and tests allows teams to take action in line with their unique profile.
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=Mxc7Ju8xK60
  recorded: true
- time_start: '14:00'
  time_end: '14:50'
  track: Talk - Other
  room: L2.85
  title: 'BTC as an IOC: Using Blockchain for Attribution'
  speakers:
  - name: Jackie Burns Koven
    company: null
    title: null
  description: Incident attribution is riddled with controversy and folly for even the most seasoned analysts. Leaked code,
    commodity malware, and the rapid rebranding of ransomware strains have further complicated the task. Blockchain intelligence
    can help visualize the underground ecosystem and attack kill chain, lending to unique financial footprints of specific
    threat actors or groups -- not to mention where scammed, extorted, or stolen funds go. This talk covers examples of how
    blockchain forensics can unmask ransomware rebrands and threat actors leveraging multiple monikers and crimes.
  type: talk
  slides_url: null
  video_url: null
  recorded: true
- time_start: '14:00'
  time_end: '14:50'
  track: Talk - Red
  room: L.63
  title: 'Hacking Serverless Applications: A Treasure Map for Uncharted Waters'
  speakers:
  - name: Matteo Rosi
    company: null
    title: null
  description: 'Serverless technology eliminates the need for development teams to provision servers, passing the responsibility
    for some security threats to the cloud provider and freeing-up developers to concentrate on building logic and producing
    value quickly. But even without servers, serverless functions still execute code, which can lead to a cloud disaster,
    if not done right.


    In this talk, we will discuss common risks and challenges in serverless environments. I will introduce techniques used
    by attackers to exploit Serverless apps in unconventional ways. I will also demonstrate exploits of recently discovered
    CVE, targeting cloud functions.'
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=bXvrKY6XNAQ

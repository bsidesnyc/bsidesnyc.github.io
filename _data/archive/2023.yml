  track: Talk - Blue
  room: L2.84
  title: Elements of an Effective Software Supply Chain Strategy
  speakers:
  - name: Anita D'Amico
    company: null
    title: null
  description: Are you developing software? If so, there's a good chance that generating a Software Bill of Materials (SBOM)
    is in your future. Fears of vulnerabilities in the software supply chain have accelerated demands for SBOMs by customers.
    This presentation will explain what an SBOM is, who is asking for them, what they are going to do with them, the standard
    formats in which they are issued, and how to generate them. It will also describe how SBOMs fit into vulnerability disclosure
    and remediation processes and add transparency to the software supply chain.
  type: talk
  slides_url: null
  video_url: https://www.youtube.com/watch?v=pSSyDmux_f0
  recorded: true

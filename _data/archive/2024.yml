  room: L2.85
  title: Volt Typhoon and the Threat to Critical Infrastructure
  speakers:
  - name: Jonathan Goll
    company: CISA
    title: Cybersecurity Advisor | CISA Region 2
  description: Volt Typhoon is a PRC sponsored threat actor who is looking to burrow deep within critical infrastructure networks.
    Current assessments indicate this is pre-positioning activity if there is an escalation that causes conflict with Taiwan.
    This briefing will cover the LOTL techniques used by Volt Typhoon, traditional attack path observed up to this point,

  title: Cybersecurity Considerations for Brain-Computer Interfaces
  speakers:
  - name: Tyler Schroder
    company: Yale University
    title: Director's Fellow, Digital Ethics Center at Yale University
  - name: Renee Sirbu
    company: Yale University
    title: Researcher, Yale Digital Ethics Center
  description: Brain-computer interfaces (BCIs) show enormous potential for advances in personalized medicine. Despite clear
    therapeutic benefits, BCIs offer a direct pathway to the brain, introducing new avenues for cyber-attacks or security
    compromises. In forthcoming original research with the Digital Ethics Center at Yale University, we make three core policy
    recommendations to device manufacturers and regulators to better secure these devices and protect patient safety.
  type: talk
  slides_url: null
  video_url: null
  recorded: false

    company: Helena
    title: CEO&Founder Helena | Cybersecurity SME | Keynote, Moderator, MC, Speaker | Strategic Cybersecurity Advisor |  Board
      Advisor | Board Member | Author | Podcaster | Mentor
  description: As a CISO I'm paid not to trust anyone, so how can you sell something to the CISO. Effective communication
    is crucial in cybersecurity, whether you're advocating for resources, explaining risks to non-technical stakeholders,
    or leading a security awareness program. This session will cover strategies for discussing cybersecurity concepts and

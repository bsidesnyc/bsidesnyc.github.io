  room: L.63
  title: 'From HiatusRAT to Cuttlefish: advances in credential theft through the router'
  speakers:
  - name: Danny Adamitis
    company: Lumen Technologies
    title: Principal Information Security Engineer
  description: Last year we published our research on the HiatusRAT malware, which infected small office/home office (SOHO)
    routers of selected targets, and quietly stole access credentials for use against downstream systems. Now we'd like to
    present our latest research on a new malware that appears to have been written by the same authors, showing enhanced function
    and a greater threat. Cuttlefish sits passively on the router until it sees the conditions it was made for - either sniffing
    traffic or hijacking DNS and HTTP requests to steal authentication material.
  type: talk
  slides_url: null
  video_url: https://youtu.be/OA5p3VJk9R0?si=GChGOHaXu23HddtJ

  title: Breaking free from the chains of fate - Bypassing AWSCompromisedKeyQuarantineV2 Policy
  speakers:
  - name: gl4ssesbo1
    company: null
    title: Security Engineer
  - name: Opie
    company: Permiso
    title: Senior Researcher @ Permiso P0 Labs
  description: Amazon's AWSCompromisedKeyQuarantineV2 policy is not the panacea it might seem. Join us on an adventure of
    all the myriad ways to work around this policy, when you discover leaked keys in the wild. This presentation is a fun,
    multimedia exploration of all the shortcomings of the AWSCompromisedKeyQuarantineV2 policy that is attached whenever Amazon
    detects that a key and secret pair have been leaked in the wild. We'll include demos of actual exploitation and color
    commentary on how this policy and defender strategy can be improved.
  type: talk
  slides_url: null
  video_url: https://youtu.be/nKwRmf-DvaI?si=4wyfZG-ElXSfXmC_

    company: Accenture
    title: Scott Miller, Penetration Tester at Accenture
  description: In the ever-expanding realm of cloud computing, understanding the vulnerabilities of widely used services is
    crucial for effective penetration testing. This talk will focus on finding and exploiting vulnerabilities in Microsoft
    Azure and Azure Active Directory (AD), now called Entra ID. We will start by understanding the architecture of Azure and
    Azure AD, providing a foundation for understanding where security issues come into play. From there, we will delve into

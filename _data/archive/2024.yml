  title: Building Burp Extensions with Kotlin
  speakers:
  - name: Nick Coblentz
    company: Virtue Security
    title: Application Penetration Team Lead at Virtue Security
  description: Pentesters often find it necessary to build their own Burp extensions in order to effectively carry out an
    application penetration test. This talk introduces using Kotlin to build those extensions. It then walks through example
    extensions created to solve challenges encountered in real world applications. I am also releasing an open source library
    to streamline common features for those extensions. Finally, as a bonus, I will cover using Bambdas to filter traffic
    and/or look for potential vulnerabilities in the HTTP Proxy tab of Burp Suite.

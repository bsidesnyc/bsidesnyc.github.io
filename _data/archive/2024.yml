  room: L.61
  title: GEN-Z Critique on SOC 2
  speakers:
  - name: Charissa Kim
    company: Semgrep
    title: Technical Program Manager (Security TPM)
  description: Over the past few months, I had the opportunity to witness Series C security startup, Semgrep, navigate its
    SOC 2 certification. I was also interested in the general understanding of SOC 2 with engineers, so I went and interviewed
    50 of them to hear their viewpoints! I uncovered surprising insights into SOC 2, GRC, and security policies. In this talk,
    I'll share the essential steps for obtaining SOC 2 certification at a tech startup, providing quick and straightforward
    strategies for success.

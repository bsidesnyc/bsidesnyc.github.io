  title: Building canaries with ELK and ElastAlert2
  speakers:
  - name: Andrew Januszak
    company: null
    title: Systems Engineer and Pentester
  - name: Keith Erekson
    company: null
    title: Systems Architect and Security Enthusiast
  description: Canaries (honeytokens, canary tokens, canary files, canary accounts, etc...) are relatively low-effort high-gain
    defensive tools. We wanted to use our existing infrastructure and tooling to implement canaries in various places across
    different services. We decided to build our own canaries, leveraging our ELK stack for data collection and our ElastAlert2
    instance for alert tuning and generating notifications across different communication channels.
  type: talk

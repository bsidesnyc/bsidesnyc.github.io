  title: 'BSidesNYC 0x04 Keynote: When Do We Get to Play On Easy Mode?'
  speakers:
  - name: Wendy Nather
    company: null
    title: Some Kind of Cyber Professional
  description: Many of us have been in the industry for a long time, and we keep seeing the same problems over and over again.
    We scramble to keep up with the new technology, and the long tail of the older tech stretches ever further behind us but
    never goes away. And what's that definition of insanity again? trying the same things over and over again, expecting a
    different result? It's time to look more critically at our assumptions and incentives, and maybe do a little table-flipping
    so that we can finally catch a break.
  type: keynote

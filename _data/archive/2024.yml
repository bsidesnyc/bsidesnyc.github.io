  title: 'Trusted Types: DOM XSS Protection at Scale'
  speakers:
  - name: Jen Ozmen
    company: Google
    title: Software Engineer at Google's Web Security Team
  - name: Youssef Attia
    company: Google
    title: Software Engineer at Google's Web Security Team
  description: DOM XSS continues to be the most critical threat to web security. It occurs when an attacker can inject malicious
    code into a web page, which can then be executed by the victim's browser. Our current best defense against DOM XSS is
    Trusted Types, a browser-based runtime feature to limit the uses of DOM APIs (and limit the possibility of DOM injection).
    This talk will discuss why DOM XSS is a critical threat, how Trusted Types protects dangerous DOM APIs, Google's experience
    deploying Trusted Types across its web services, and challenges when adopting Trusted Types for the open source ecosystem.
  type: talk
  slides_url: null
  video_url: https://archive.org/details/bsidesnyc2024?playlist=1&file=B04_Trusted_Types_-_DOM_XSS_Protection_at_Scale.mp4
  recorded: false

  title: 'Open & Secure: Novel Sandboxing Technique for Any Open Source Library'
  speakers:
  - name: Gal Elbaz
    company: Oligo Security
    title: Co-founder & CTO at Oligo Security
  description: Security teams from Google to Firefox have taught the security industry a lot about isolating running programs
    from the broader system through sandboxing, which fundamentally changed the way hackers need to operate to inflict damage
    on systems. In this talk we'll present a first of its kind approach, built upon the powerful eBPF and KRSI technologies,
    that enables you to derive the very same security benefits of browser and web-based, as well as mobile sandboxing - for
    any open source library you are running in your stacks.
  type: talk
  slides_url: null
  video_url: https://archive.org/details/bsidesnyc2024?playlist=1&file=B07_Open_and_Secure_-_Novel_Sandboxing_Technique_for_Any_Open_Source_Library.mp4

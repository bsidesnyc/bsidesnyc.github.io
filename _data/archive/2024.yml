  track: Tech - Other
  room: L2.85
  title: 'Cloud Warfare: Grappling and Strangling Scattered Spider'
  speakers:
  - name: Andi Ahmeti
    company: Permiso Security
    title: Associate Threat Researcher at Permiso Security
  - name: Abian Morina
    company: Permiso Security
    title: Associate Threat Researcher
  description: LUCR-3, also known as Scattered Spider, is a highly persistent threat actor group notorious for their sophisticated
    cloud-focused attacks. Moving beyond typical cryptomining campaigns, LUCR-3 employs advanced techniques such as push fatigue
    attacks and SIM swapping to bypass multi-factor authentication (MFA). Permiso's P0 Labs has tracked LUCR-3 for over 1.5
    years, offering detailed insights into their tactics, techniques, and procedures (TTPs).
  type: talk
  slides_url: null
  video_url: https://archive.org/details/bsidesnyc2024?playlist=1&file=O04_Cloud_Warfare_-_Grappling_and_Strangling_Scattered_Spider.mp4

  title: 'CloudTail: Making Heads or Tails of Selectively Retaining Multi-Cloud Logs (w/o a SIEM!)'
  speakers:
  - name: Ela Dogjani
    company: Permiso
    title: Associate Threat Researcher at Permiso
  description: In the complex landscape of cloud computing, effectively managing & retaining logs across multiple cloud providers
    is a vital but often daunting responsibility, especially for smaller organizations without budget for a SIEM. In this
    presentation I will publicly release CloudTail, an open-source framework designed to simplify the long-term retention
    & searchability of a highly configurable curated list of cloud events across numerous cloud providers - all without the
    usage of a SIEM!
  type: talk

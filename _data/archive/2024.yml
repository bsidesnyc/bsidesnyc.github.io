  room: L2.85
  title: Quantum Computing and Its Impact on Cybersecurity
  speakers:
  - name: Rashmi
    company: AWS
    title: Application Security Engineer, AWS
  description: Quantum computing is poised to revolutionize the field of cybersecurity, introducing both unprecedented opportunities
    and significant challenges. This session will delve into the fundamental principles of quantum computing and its stark
    differences from classical computing. We will explore how quantum algorithms, like Shor's algorithm, threaten current
    encryption methods such as RSA and ECC, necessitating the development of quantum-resistant cryptography.
  type: talk
  slides_url: null
  video_url: null
  recorded: false
- time_start: '11:30'
  time_end: '12:00'
  track: Tech - Red
  room: L.63
  title: How I hacked a cloud production environment with external Terraform manipulation
  speakers:
  - name: Uri Aronovici
    company: ZEST Security
    title: Co-Founder & CTO - ZEST Security
  description: Terraform by HashiCorp is a leading Infrastructure as Code (IaC) tool that enables DevOps to define and provision
    cloud infrastructure. At the heart of Terraform's functionality are many external modules, services and third-party components
    that are used for planning and deployment. We uncovered a new attack path which has high probability as it leverages commonly-used
    external Terraform functionalities that are often not properly vetted or even visible. In this session, Uri will cover
    how he exploited a widely-used Terraform deployment as part of a CI/CD process to gain full control of a cloud production
    environment.
  type: talk
  slides_url: null

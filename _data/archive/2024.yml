  speakers:
  - name: euphoricfall
    company: Pulsedive
    title: Cofounder & COO at Pulsedive
  description: This is a true and transparent recounting about one company's journey bootstrapping in a sea of media coverage
    and interest around VC-backed investments. This talk covers the creation and organic growth of a US-based SaaS threat
    intelligence startup. Drawing from firsthand experiences, the presentation sheds light on the challenges, triumphs, and
    invaluable lessons learned in going from very first customer to steady revenue.

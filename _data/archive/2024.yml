  track: Tech - Other
  room: L2.85
  title: 'Caught in the Net: Using Infostealer Logs to Unmask CSAM Consumers'
  speakers:
  - name: Mariya Gedrich
    company: Recorded Future
    title: Threat Intelligence Analyst at Recorded Future
  description: In this proof of concept study, we delve into "logs" that were compromised by infostealer malware and obtained
    legally by Recorded Future. We use the large dataset of stolen data at our disposal to turn the tables on cybercriminals
    to identify criminal activity, arrive at geographic trends and make previously unseen connections between criminals.
  type: talk

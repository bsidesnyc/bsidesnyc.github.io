  title: How We Impersonated Cloud Code by Google Cloud and Took Over GCP Accounts
  speakers:
  - name: Moshiko
    company: Upwind Security
    title: Upwind Security, Research Lead
  description: In this presentation, we delve into a recent security research project where we discovered critical vulnerabilities
    in Google's Cloud Code, an IDE extension designed for enhancing GCP integration. Our research revealed exposed OAuth client
    IDs and secrets, which we exploited to impersonate legitimate Google tools and gain unauthorized access to GCP accounts.

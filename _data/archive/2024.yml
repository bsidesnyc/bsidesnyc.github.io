  title: 10 Things to Know Before You Work on Your Next M365 BEC
  speakers:
  - name: Ida Musheyev-Polishchuk
    company: Stroz Friedberg
    title: Senior Consultant at Stroz Friedberg's Digital Forensics and Incident Response
  - name: Natasha Vij
    company: Stroz Friedberg
    title: DFIR Consultant at Stroz Friedberg, an Aon Company
  description: As incident responders we investigate M365 Business email compromises ("BEC") daily. BEC's significantly disrupt
    operations, making swift and effective remediation essential. In this session, we will be discussing the top 10 insights
    gained from our extensive experience in investigating these matters. We will cover quick wins, data exfiltration techniques,
    and log anomalies to find malicious activity and IOCs. Attendees will leave with several tips and tricks to handle their
    next BEC confidently.

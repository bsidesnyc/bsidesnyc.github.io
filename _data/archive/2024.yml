  title: 'The Life of an SBOM: Where does it go and what do organizations do to it and with it?'
  speakers:
  - name: Anita D'Amico
    company: Cotopaxi Consulting
    title: Advisor to security startups and investors, Software supply chain strategist
  - name: Ken Zalevsky
    company: Vigilant Ops
    title: CEO, Vigilant Ops, Medical technology cybersecurity and SBOM expert
  description: Software suppliers produce Software Bills of Material (SBOMs) to fulfill regulatory or procurement requirements.
    But what happens to an SBOM after initial creation and what value does it really provide to an organization's cybersecurity?
    This session describes the lifecycle of an SBOM and its use in managing vulnerabilities in deployed software, with practical
    examples from medical technology (MedTech) and healthcare.

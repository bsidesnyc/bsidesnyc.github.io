    company: SplxAI
    title: CTO & Co-Founder of SplxAI
  description: Ready to dive into the wild world of GenAI pentesting? Join Ante Gojsalic, CTO and Co-Founder of SplxAI, for
    a no-BS, hands-on workshop where you'll go from zero to hero in evading GenAI application defenses. This isn't your typical
    lecture - we're talking real hacking, real techniques, and real-time problem-solving. You'll learn how to spot and exploit

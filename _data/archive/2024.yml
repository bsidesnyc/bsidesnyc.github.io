  title: 'Bridging the Gap: Developing Accessible Anti-Phishing Solutions'
  speakers:
  - name: Lydia Stepanek
    company: Pen Loop Consulting
    title: Owner and Lead Engineer, Pen Loop Consulting
  description: In the realm of cybersecurity, the battle against phishing attacks remains a perpetual challenge. While email
    providers offer spam filters and enterprises invest in sophisticated anti-phishing solutions, there's a noticeable gap
    in accessibility for the average internet user. This session delves into the journey of building an anti-phishing tool
    tailored for regular people, exploring the challenges encountered and the valuable lessons learned along the way.

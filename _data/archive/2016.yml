  - time_start: "10:00"
    time_end: "10:45"
    track: Track 1
    room: L.63
    title: Docker Containers for Malware Analysis
    speakers:
      - name: Lenny Zeltser
        company: NCR Corp
        title: Product Management Director
    description: >-
      There are wonderful malware analysis applications out there that run well
      on Linux; however, installing and configuring them could be quite
      challenging. A relatively new approach using such tools involves running
      them as application containers. This session will discuss how you can use
      malware analysis tools that are already distributed as Docker images as
      part of the REMnux project. These tools include Thug, Viper, JSDetox, and
      others. It will also offer tips for packaging your favorite apps in a
      similar manner. Attend this session to start learning about Docker
      containers, so you can not only use them when examining malicious software,
      but also so you better understand what application containers are and what
      role they might play alongside other infrastructure technologies.
    type: talk
    slides_url: "https://github.com/bsidesnyc/BSidesNYC2016/blob/master/Presentations/Lenny%20Zeltser%20-%20Docker%20Containers%20for%20Malware%20Analysis.pdf"
    video_url: null
    recorded: false

  - time_start: "10:00"
    time_end: "10:45"
    track: Track 2
    room: L.76
    title: "The Ransomware Threat: Tracking the Digital Footprints"
    speakers:
      - name: Kevin Bottomley
        company: null
        title: null
    description: >-
      The continuing evolution of ransomware is a constant threat to businesses
      of all types. Taking a stroll through the timeline of ransomware from its
      infancy to current variants, this session will walk through the
      methodologies for prevention, containment, and detection... both inside the
      system and by following the digital footprints to hunt it in the wild.
    type: talk
    slides_url: null
    video_url: null
    recorded: false


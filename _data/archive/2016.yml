  - time_start: "16:00"
    time_end: "16:45"
    track: Track 1
    room: L.63
    title: No Silver Bullet. Multi contextual threat detection via Machine Learning
    speakers:
      - name: Rod Soto
        company: Splunk User Behavioral Analytics
        title: Security Researcher
      - name: Joseph Zadeh
        company: null
        title: Security Data Scientist
    description: >-
      Current threat detection technologies lack the ability to present an
      accurate and complete picture of how threats are executed and fail to put
      together the multi contextual relationship of exploit chain indicators. A
      combination of behavioral and machine learning technologies can provide a
      more effective and complete assessment and prevention of threats in
      organizations relying on dispersed, static single indicator technologies.
      This approach also makes use of current static and single threat indicator
      technologies using Big Data computational models.
    type: talk
    slides_url: null
    video_url: null
    recorded: false

  - time_start: "16:00"
    time_end: "16:45"
    track: Track 2
    room: L.76
    title: The Pagentry of Lateral Movement
    speakers:
      - name: Stuart Morgan
        company: null
        title: null
    description: >-
      In order to meaningfully compromise a client, you need to take advantage of
      every opportunity to gather information and laterally move around the
      network. This talk will discuss ways of abusing Pageant (PuTTY's SSH
      agent) on a fully patched Windows host, including a demonstration of a
      meterpreter extension which can tunnel SSH agent traffic in a manner that
      is almost undetectable with default logging options, and the way that an
      existing reconnaissance tool from 2012 was improved to make its output
      easier to use during a simulated attack or penetration test.
    type: talk
    slides_url: null
    video_url: null
    recorded: false

  - time_start: "17:00"
    time_end: "17:45"
    track: Track 1
    room: L.63
    title: An Adversarial View of SaaS Malware Sandboxes
    speakers:
      - name: Jason Trost
        company: ThreatStream, Inc.
        title: VP of Threat Research
      - name: Aaron Shelmire
        company: ThreatStream
        title: Security Professional
    description: >-
      Anyone attending this conference knows the usefulness of running malware in
      a sandbox to perform triage, speed security analysts' workflow, extract
      indicators of compromise (IOCs), and to gather useful information for
      detection and mitigation. When analysts do this, what are the OPSEC
      concerns regarding tipping the adversary off? Which sandbox providers are
      better than others in this regard? In this talk we will present some
      research on taking an adversarial view of the free and widely used SaaS
      malware sandboxes. When an adversary's malware is detonated in a sandbox,
      what network artifacts can they see? Can they determine which sandbox
      provider based on the network? How do malware and related IOCs submitted to
      these sandboxes propagate to security companies and ultimately threat
      intelligence feeds? In this talk, we will answer all these questions and
      more.
    type: talk
    slides_url: "https://github.com/bsidesnyc/BSidesNYC2016/blob/master/Presentations/Jason%20Trost%20%26%20Aaron%20Shelmire%20-%20An%20Adversarial%20View%20of%20SaaS%20Sandboxes.pdf"
    video_url: null
    recorded: false

  - time_start: "17:00"
    time_end: "17:45"
    track: Track 2
    room: L.76
    title: Warranty Void If Label Removed - Attacking MPLS Networks
    speakers:
      - name: G. Geshev
        company: null
        title: null
    description: >-
      This talk will be a walk-through of research findings from assessing
      multiple MPLS implementations and the various key weaknesses that were
      found to affect a number of leading vendors. General MPLS and MPLS related
      terms and concepts will be briefly introduced to the audience, followed by
      an overview of a typical service provider network, classic topologies and
      basic traffic engineering strategies. It should be noted that none of the
      examples and demonstrations require access to the MPLS backbone. This talk
      will be concluded with both general and, where applicable, vendor specific
      best practices and recommendations on reducing the attack surface of an
      MPLS network.
    type: talk
    slides_url: "https://github.com/bsidesnyc/BSidesNYC2016/blob/master/Presentations/G.%20Geshev%20-%20Warranty%20Void%20If%20Label%20Removed.pdf"
    video_url: null
    recorded: false


    room: L.76
    title: How Hackers View Your Web Site
    speakers:
      - name: Patrick Laverty
        company: null
        title: null
    description: >-
      We know about web vulnerabilities. We know web sites have them. In this
      talk, we see them all together, maybe including some that you weren't
      thinking of or aware of. Let's see how a hacker sees your web site and all
      those vectors for attack.
    type: talk
    slides_url: "https://github.com/bsidesnyc/BSidesNYC2016/blob/master/Presentations/Patrick%20Laverty%20-%20How%20A%20Hacker%20Sees%20Your%20Site.pdf"

  - time_start: "11:00"
    time_end: "11:45"
    track: Track 1
    room: L.63
    title: Defense at Scale
    speakers:
      - name: Jan Schaumann
        company: null
        title: null
    description: >-
      An old infosec truism notes that companies are divided into those who have
      been hacked and those who don't know they've been hacked. As the industry
      evolves, systems grow more and more complex, simultaneously increasing the
      attack surface manifold. What's worse, the Internet of (Insecure) Things
      combines brand new attack vectors with decades old bugs. How can we keep
      up? This talk delves into the idea of defending smarter, not harder; the
      techniques we need to apply to develop intelligent and automated defenses;
      the necessity of scaling your team beyond a reactive stance.
    type: talk
    slides_url: "https://github.com/bsidesnyc/BSidesNYC2016/blob/master/Presentations/Jan%20Schaumann%20-%20Defense%20at%20Scale.pdf"
    video_url: null
    recorded: false

  - time_start: "11:00"

  - time_start: "14:00"
    time_end: "14:45"
    track: Track 1
    room: L.63
    title: 99 Problems but a Microkernel ain't one!
    speakers:
      - name: Alex Plaskett
        company: null
        title: null
    description: >-
      Cars, Safety Critical Systems and consumer devices (phones) all run QNX,
      however, very little security research has been performed in this area.
      This talk will provide an overview of QNX security architecture with
      Blackberry 10 used as the primary target. It will discuss research on a
      locked down highly secured embedded OS, the OS attack surface and methods
      of identifying vulnerabilities from both a reverse engineering perspective
      and automated fuzzing approach. This talk will also highlight some of the
      novel QNX weaknesses identified with this research and the challenges
      faced with exploit development on the platform.
    type: talk
    slides_url: null
    video_url: null
    recorded: false

  - time_start: "14:00"
    time_end: "14:45"
    track: Track 2
    room: L.76
    title: The Insecurity Of Things
    speakers:
      - name: Stephen A. Ridley
        company: Xipiter
        title: Principal Researcher
    description: >-
      There is a latent distrust of the growing Internet Of Things market. The
      data collected by them is becoming more personal all while proliferation of
      internet connected devices is continuing without regard to privacy or
      security. Recent news stories have consumers concerned not only with
      privacy but also surveillance and data handling. The enterprise, medtech,
      industrial control, and other verticals have plenty to worry about also. To
      compound the problem, IoT and internet connected consumer devices are each
      made from custom hardware and software. This lack of homogeneity in design
      makes traditional software-based security (like anti-virus) virtually
      impossible. Since the traditional solutions aren't applicable to these new
      ubiquitous devices, new techniques and technologies are needed. We'll talk
      about how we've been approaching the problem with a new platform called
      Senrio. At Xipiter we've been working on the security of embedded systems
      and IOT devices. Xipiter has built several industry unique trainings on
      mobile security and embedded device security. Each of which has sold out
      at Blackhat (the largest security conference in the world) for three years
      in a row. We've helped numerous manufacturers secure their embedded
      devices. From Point Sales and Entertainment Systems to the more esoteric
      vendors of Gaming systems and Industrial Controls Systems.
    type: talk
    slides_url: null
    video_url: null
    recorded: false

  - time_start: "15:00"
    time_end: "15:45"
    track: Track 1
    room: L.63
    title: "Change is the only constant: A day in the life of DNS changes"
    speakers:
      - name: Ben April
        company: null
        title: null
    description: >-
      We took a one-day snapshot of Farsight's new DNS Changes channel and tore
      into it like an unsupervised 9 year old with a screwdriver. Inside we
      found CDNs, DGAs, phone-home services, VPN tunnels, some RTFM moments,
      and some WTF moments. Catch this inside glimpse of what you can learn
      about your network or your adversary by monitoring DNS.
    type: talk
    slides_url: null
    video_url: null
    recorded: false

  - time_start: "15:00"
    time_end: "15:45"
    track: Track 2
    room: L.76
    title: Making & Breaking Machine Learning Anomaly Detectors in Real Life
    speakers:
      - name: Clarence Chio
        company: Shape Security
        title: Product Developer
    description: >-
      Machine learning (ML) techniques used in network intrusion detection are
      susceptible to adversarial model poisoning. We demonstrate this attack and
      analyze some proposals for how to circumvent it, then consider specific use
      cases of ML and anomaly detection in a security context. We analyze how ML
      can be used in security and why it is not as straightforward as once
      thought.
    type: talk
    slides_url: null
    video_url: null
    recorded: false


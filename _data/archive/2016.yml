  - time_start: "13:00"
    time_end: "13:45"
    track: Track 1
    room: L.63
    title: Mobile implants in the age of cyber-espionage
    speakers:
      - name: Dmitry Bestuzhev
        company: Kaspersky Lab
        title: Head of Global Research and Analysis Team for Latin America
    description: >-
      This research is about mobile implants used in APT attacks. I will go
      through implants used ITW to spy on targets using iOS, Android, Windows
      Mobile and Android. I'll present current APT-threat actors mobile
      capabilities based on the code analysis/reversing I did. All samples are
      not PoC but real in-the-wild samples.
    type: talk
    slides_url: null
    video_url: null
    recorded: false

  - time_start: "13:00"
    time_end: "13:45"
    track: Track 2
    room: L.76
    title: "Beyond IDS: Practical Network Hunting"
    speakers:
      - name: Josh Liburdi
        company: null
        title: null
    description: >-
      Aimed at incident response and threat detection attendees, this talk
      highlights practical hunting techniques for identifying adversaries in
      network-based data. The talk will review general hunting techniques that
      can be applied to any dataset, discuss tools that make network-based
      hunting possible, and dive deep into practical ways to hunt adversaries in
      network-based data. Open source code for the Bro network security monitor
      tool will be released on the day of the talk to support some of the
      hunting techniques that will be discussed.
    type: talk
    slides_url: "https://github.com/bsidesnyc/BSidesNYC2016/blob/master/Presentations/Josh%20Liburdi%20-%20Beyond%20IDS.%20Practical%20Network%20Hunting.pdf"
    video_url: null
    recorded: false


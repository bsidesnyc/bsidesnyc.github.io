- time_start: '13:00'
  time_end: '13:50'
  track: Track 2
  room: L.76
  title: Moving Graph Analytics to Higher Dimensions to Discover Network Activity / Anomalies that are implicit in behavior
    - Connections in High Dimensions
  speakers:
  - name: Richard Lethin
    company: Reservoir Labs
    title: President
  description: 'Advanced mathematics made simpler: Spectral Hypergraph Analysis for mortals. Imagine lighting up and "shining"
    your network logs through a special prism that would separate behaviors into a "spectrum" that would indicate to you things
    that are going on on your network. Some of the those things might be important discoveries with security implications.
    Doing this would be like how astronomers determine the materials that are burning in a distant star, using a special telescope
    to get the spectrum of that star''s light. It turns out that there is a mathematical way to do this on network logs, involving
    a generalization of the Fourier Transform over high dimensional graphs. This talk will explain this technology in accessible
    ways, and show examples of its use in discovering "bad stuff" on a very large network.'
  type: talk
  slides_url: https://github.com/bsidesnyc/BSidesNYC2018/blob/master/Presentations/Reservoir%20Lethin%20-%20Moving%20Graph%20Analytics%20to%20Higher%20Dimensions%20to%20Discover%20Network%20Activity%20%3A%20Anomalies%20that%20are%20implicit%20in%20behavior%20-%20Connections%20in%20High%20Dimensions.pdf

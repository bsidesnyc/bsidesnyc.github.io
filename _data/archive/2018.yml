  title: Product Management of Security Solutions
  speakers:
  - name: Lenny Zeltser
    company: Minerva Labs
    title: VP of Products
  description: Established enterprises as well as startups have much to consider when deciding how to build, deliver and maintain
    information security products that make sense for their businesses and customers. The individuals tasked with creating
    and overseeing such offerings often have "product management" in their titles. What do these people do? What skills do
    they possess? This session explores the mindset of a product manager who focuses on information security solutions. Those
    new to this discipline will better understand whether they should consider such a role. Those already tasked with managing
    security solutions will benefit from hearing about a lightweight framework that can help them make better decisions about
    their products.

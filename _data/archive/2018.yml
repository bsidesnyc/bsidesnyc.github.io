  track: Track 1
  room: L.63
  title: Threat-Based Risk Management
  speakers:
  - name: Julian Cohen
    company: Automatic Playbook Testing
    title: null
  - name: Justin Berman
    company: Zenefits
    title: CISO
  description: 'The security industry has been talking about powerful concepts like good threat intelligence and attacker
    cost for a long time now, but most organizations are not using these concepts in their security programs, causing them
    to waste money, time, and energy on efforts that do not stop real attackers.


    In this talk, we describe a security program built around adversary intelligence that actually matters. We describe how
    this program generates more accurate and precise priorities and objectives. We demonstrate how these new risk profiles,
    attacker playbooks, and attacker cost models can help inform better controls, strategies, and policies.


    We focus on picking the controls that are most effective at reducing the risk of successful execution of the playbooks
    that attackers use everyday. This is only possible with a security program built around attacker intelligence.


    We take a deep dive into the practicalities of implementation of these concepts at your organization. What metrics matter
    to show to management, how this impacts hiring, and how this modifies core workflows in the security team.


    Finally, we will close with some of the concrete challenges we encountered in implementing this program and some suggestions
    on how to work around them.'
  type: talk
  slides_url: https://github.com/bsidesnyc/BSidesNYC2018/blob/master/Presentations/Julian%20Cohen%20and%20Justin%20Berman%20-%20Threat-Based%20Risk%20Management.pdf
  video_url: null
  recorded: false
- time_start: '15:00'
  time_end: '15:50'
  track: Track 2
  room: L.76
  title: Taste the Rainbow
  speakers:
  - name: David Hartley
    company: MWR InfoSecurity
    title: null
  description: 'Adversarial Simulation, Red Team, Threat Emulation, Blue Team, Targeted Attack Simulation, Purple Team or
    Gold Team - So many labels and buzzwords. No matter what you call it or whatever color shirt you wear / team you identify
    most with - this talk offers something for you; no matter the camp you are in.


    At MWR we''ve spent many years robbing banks, pulling off casino heists, breaching merchants, bringing down Critical National
    Infrastructure (CNI), flooding mines, stealing all the things and doxing big corps. But more importantly, we''ve also
    helped many of those clients make sure none of the stuff we did, could happen for real.


    This presentation will take you on a journey showing you how our TTP''s have evolved over the past few years - why we''ve
    evolved them, what works now, what doesn''t and why - we''ll also give you insights into what''s coming next. There will
    be takeaways for everyone - whether your looking to up your offensive game, or as a defender looking to get a heads up
    on whats gonna be hitting you soon (as well as what to do about it!).


    Having delivered assessments all around the world over several years; as part of and separate to regulatory frameworks
    such as CBEST, TIBER, iCAST, we''ve sparred with some heavy hitters and a lot of lessons have been learned - we''d like
    to share some of these with you. There might just be some entertaining tales too - like that one time we were fingered
    as a new and shiny Russian APT...'
  type: talk
  slides_url: https://github.com/bsidesnyc/BSidesNYC2018/blob/master/Presentations/Dave%20Hartley%20-%20Taste%20The%20Rainbow.pdf
  video_url: https://archive.org/details/bsidesnyc2018?playlist=1&file=09_Taste_the_Rainbow.mp4
  recorded: true

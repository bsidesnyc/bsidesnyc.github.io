  track: Track 1
  room: L.63
  title: 'Open Up and Say 0x41414141: Attacking Medical Devices'
  speakers:
  - name: Robert Portvliet
    company: Cylance
    title: Technical director of red team services
  description: 'Network accessible medical devices are ubiquitous in today''s clinical environment. These devices can be of
    great aid to healthcare professionals in assessing, treating and monitoring a patient''s condition. However, they can
    also fall victim to a number of systemic vulnerabilities that can expose personal health information or PHI, compromise
    the integrity of patient data in transit, and affect the availability of the devices themselves.


    This talk looks at the methodology and approach to penetration testing of modern medical devices. It will provide an overview
    of the various stages of a medical device assessment, including discovery and analysis of a device''s remote and local
    attack surface, reverse engineering and exploitation of proprietary network protocols, vulnerability discovery in network
    services, compromising supporting systems, attacking common wireless protocols, exploitation of hardware debug interfaces
    and bus protocols and assessing proprietary wireless technologies.


    It will also cover a number of real world vulnerabilities that the speaker has discovered during medical device penetration
    testing assessments. These include weak cryptographic implementations, device impersonation and data manipulation vulnerabilities
    in proprietary protocols, unauthenticated database interfaces, hardcoded credentials/keys and other sensitive information
    stored in firmware/binaries and the susceptibility of medical devices to remote denial of service attacks.


    The talk will conclude with some suggestions on how some of the most common classes of medical device vulnerabilities
    might be remediated by vendors and also how hospitals and other healthcare providers can defend their medical devices
    in the meantime.'
  type: talk
  slides_url: https://github.com/bsidesnyc/BSidesNYC2018/blob/master/Presentations/Robert%20Portvliet%20-%20Open%20Up%20and%20Say%200%C3%9741414141%20-%20Attacking%20Medical%20Devices.pdf
  video_url: https://archive.org/details/bsidesnyc2018?playlist=1&file=05_Open_Up_and_Say_0x41414141.mp4
  recorded: true
- time_start: '11:00'

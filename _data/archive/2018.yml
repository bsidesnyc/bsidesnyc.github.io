  track: Track 1
  room: L.63
  title: Practical Analysis of Awareness
  speakers:
  - name: Kendra Cooley
    company: MailChimp
    title: Senior Security Operations Engineer
  description: 'Many organizations participate in Security Awareness training. Whether it is something that is produced internally
    or supplied by a third-party vendor, the goals are the same: educate the user to prevent becoming the next big breach
    in the news. We all know the phrase ''you can''t patch humans'', but what metrics can we use to see if our awareness efforts
    are effective? Believe it or not, Security Analysts have access to a lot of valuable information that can show us just
    how effective these programs are... and no, I''m not just talking about the results of your last phishing campaign.'
  type: talk
  slides_url: null
  video_url: https://archive.org/details/bsidesnyc2018?playlist=1&file=04_Practical_Analysis_of_Awareness.mp4
  recorded: true
- time_start: '10:05'
  time_end: '10:50'
  track: Track 2
  room: L.76
  title: Hunting for Lateral Movement
  speakers:
  - name: Mauricio Velazco
    company: null
    title: null
  description: After obtaining an initial foothold on an environment, attackers are forced to embark in lateral movement techniques
    in order to be successful in identifying and exfiltrating sensitive information. To stay ahead of the bad guys, the Blue
    team needs to have a clear understanding of these techniques as well as the forensic artifacts these techniques leave
    behind on the victim hosts. Armed with this knowledge, we can proactively hunt for lateral movement in the environment
    before exfiltration can occur. This presentation will analyze Lateral Movement from both a Red and Blue team perspective
    and introduce Oriana, a lateral movement hunting tool that can assist the Blue team in catching the adversary.
  type: talk
  slides_url: null
  video_url: null

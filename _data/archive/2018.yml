- time_start: '14:00'
  time_end: '14:50'
  track: Track 1
  room: L.63
  title: firewalls-- threat or menace?
  speakers:
  - name: Paul Vixie
    company: Farsight Security
    title: Chairman and CEO
  description: 'Internet communications is cyclic; provisioning and security decisions are not made with one-off traffic units
    in mind. Traditional in-path firewalls are for this reason often stateful, but the value-add from such state-keeping comes
    with a healthy downside: the state-keeping is a new attack surface. Given the fate-sharing that goes on behind a firewall,
    if an attack against some internal resource has the capability of bringing the firewall down and thus affecting other
    internal resources, then the firewall implicitly becomes an effective force-multiplier for the attacker. There are other
    ways to do security, which take better account of an attacker''s capabilities and alternatives. For example, protocol-aware
    rate limiting may offer cheaper deployment cost with a better worst-case outcome.'
  type: talk
  slides_url: null
  video_url: https://archive.org/details/bsidesnyc2018?playlist=1&file=07_firewalls_–_threat_or_menace.mp4
  recorded: true

  track: Track 2
  room: L.76
  title: Evading C2 Detection with Asymmetry
  speakers:
  - name: Brandon Arvanaghi
    company: Gemini
    title: Security Engineer
  - name: Andrew Johnston
    company: Mandiant
    title: Proactive Consultant
  description: Detecting callouts to command-and-control (C2) servers used to be straightforward, but attackers in your network
    have found ways to communicate with the outside world even under the heaviest of scrutiny. In this talk, we discuss ways
    to use popular websites as means of getting commands and exfiltrating information. We examine the applications of asymmetric
    communication, from Internet-accessible computers to embedded devices to air-gapped systems. Finally, we give some suggestions
    to defenders, and discuss how to detect and mitigate risks that enable asymmetric malware.
  type: talk
  slides_url: null
  video_url: https://archive.org/details/bsidesnyc2018?playlist=1&file=08_Evading_C2_Detection_with_Asymmetry.mp4

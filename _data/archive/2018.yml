  title: Threat hunting .NET malware with YARA
  speakers:
  - name: Santiago Pontiroli
    company: Kaspersky Lab Latin America
    title: Security Analyst | Global Research and Analysis Team (GReAT)
  description: 'YARA has recently included a module that enables researchers the creation of more fine grained rules for malware
    written for the .NET framework. These files contain valuable metadata embedded which can enable us to pinpoint a specific
    threat and reduce our number of false positives detections.


    This presentation will focus on the peculiarities of obtaining indicators of compromise from .NET malware samples and
    writing reliable YARA rules using its latest module. I''ll be showing real world examples and releasing a convenient tool
    that can query metadata information from large sets of .NET files'
  type: talk
  slides_url: https://github.com/bsidesnyc/BSidesNYC2018/blob/master/Presentations/Santiago%20Pontiroli%20-%20Threat%20hunting%20.NET%20malware%20with%20YARA.pdf

  track: Track 1
  room: L.63
  title: 2FA was part of the solution, now it's part of the problem
  speakers:
  - name: Roel Schouwenberg
    company: The Celsus Advisory Group
    title: null
  description: 'In recent years more services and people have moved to two-factor authentication. While everybody loves talking
    about the advantages of 2FA, little attention has been given to its downsides. Attackers have started adapting to ubiquitous
    2FA and are finding new ways to take over accounts ranging anywhere from email to online banking and (crypto currency)
    trading services.


    In this talk we will show how attackers can exploit various 2FA and account recovery implementation issues to hijack accounts.
    We will also propose defensive measures for both architects and end-users.'
  type: talk
  slides_url: null
  video_url: null
  recorded: false
- time_start: '17:00'
  time_end: '17:50'
  track: Track 2
  room: L.76
  title: 'Signal Safari: Investigating RF Controls with RTL-SDR'
  speakers:
  - name: Katie Knowles
    company: MWR InfoSecurity
    title: null
  description: Cranes, trains, building controls, oil rigs, and ...ceiling fans? Recent developments have made secure wireless
    protocols more common, but the fact is there's still a swarm of simpler RF controls in the wireless world around us. Luckily,
    the onset of Software Defined Radios (SDRs) means analyzing these insecure signals is easier than ever! We'll explore
    the basics of capturing and reversing simple RF control signals with the affordable RTL-SDR. With a little exploration
    through this menagerie of signals, we can unravel the mysteries of their operation and better understand what risk they
    pose to the environments we protect.

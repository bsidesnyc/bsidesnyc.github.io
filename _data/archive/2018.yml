  track: Track 2
  room: L.76
  title: 'The Politics of Intelligence: Applying History to Modern Day Cyber Threat Intelligence'
  speakers:
  - name: Paul Jaramillo
    company: CrowdStrike
    title: Principal Consultant
  description: How many organizations have an effective strategic threat intelligence operation? Many have failed and many
    struggle to obtain executive buy in or even mild interest in any of their cyber threat intelligence reports. By examining
    the history of the POTUS's use of intelligence, some powerful lessons can be learned. For instance, one president created
    and relied on his own private intelligence group of peers. Another president ignored SIGINT completely because of a preference
    for "cloaks and daggers". Yet another president, told the intelligence community their analysis will support a decision
    he has already made! These are all important insights into executive leadership, their psychology, and how best to serve
    their intelligence needs. This presentation will highlight and summarize several key lessons which can be applied to create
    or improve upon a strategic threat intelligence program.
  type: talk
  slides_url: https://github.com/bsidesnyc/BSidesNYC2018/blob/master/Presentations/Paul%20Jaramillo%20-%20The%20Politics%20of%20Intelligence%20-%20Applying%20History%20to%20Modern%20Day%20Cyber%20Threat%20Intelligence.pdf
